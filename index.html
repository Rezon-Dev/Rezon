<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="https://i.ibb.co/FkHtcJhM/1776077192856.jpg">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rezon Haque | Links</title>

  <link rel="icon" href="https://i.ibb.co/FkHtcJhM/1776077192856.jpg">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

  <style>

    #loader{
  position:fixed;
  inset:0;
  background:#05070d;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:.5s ease;
}

.loader-ring{
  width:70px;
  height:70px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,.1);
  border-top:4px solid #00ffff;
  animation:spin 1s linear infinite;
  box-shadow:0 0 35px rgba(0,255,255,.5);
}

#loader p{
  margin-top:18px;
  color:#b7c1d6;
  font-weight:700;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

#loader.hide{
  opacity:0;
  pointer-events:none;
}

.theme-toggle{
  position:fixed;
  top:20px;
  right:20px;
  z-index:1000;
  width:48px;
  height:48px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.1);
  color:white;
  font-size:20px;
  cursor:pointer;
  backdrop-filter:blur(15px);
  transition:.25s ease;
}

.theme-toggle:hover{
  transform:scale(1.08);
}

body.light{
  background:
  radial-gradient(circle at top, rgba(0,200,255,.18), transparent 30%),
  radial-gradient(circle at bottom, rgba(120,120,255,.12), transparent 30%),
  #f5f8ff;
  color:#10131c;
}

body.light .card{
  background:rgba(255,255,255,.72);
  border:1px solid rgba(0,0,0,.08);
  box-shadow:0 30px 90px rgba(0,0,0,.12);
}

body.light .subtitle,
body.light .footer{
  color:#526071;
}

body.light .theme-toggle{
  background:rgba(0,0,0,.08);
  color:#111;
}

body.light h1{
  background:linear-gradient(90deg,#111,#008b8b);
  -webkit-background-clip:text;
  color:transparent;
}

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      background:
      radial-gradient(circle at top,
      rgba(0,255,255,.18),
      transparent 30%),

      radial-gradient(circle at bottom,
      rgba(100,100,255,.12),
      transparent 30%),

      #05070d;

      font-family:Inter,sans-serif;
      color:white;

      display:flex;
      justify-content:center;
      align-items:center;

      overflow-x:hidden;
      padding:25px;
    }

    .orb{
      position:fixed;
      width:400px;
      height:400px;
      border-radius:50%;
      filter:blur(80px);
      z-index:-1;
      animation:float 7s ease-in-out infinite;
    }

    .orb1{
      top:-120px;
      left:-120px;
      background:rgba(0,255,255,.14);
    }

    .orb2{
      bottom:-140px;
      right:-100px;
      background:rgba(130,90,255,.15);
      animation-delay:2s;
    }

    @keyframes float{
      50%{
        transform:translateY(35px)
        scale(1.08);
      }
    }

    .card{

      width:min(100%,430px);

      padding:38px 26px;

      border-radius:35px;

      background:rgba(255,255,255,.07);

      border:1px solid rgba(255,255,255,.15);

      backdrop-filter:blur(25px);

      box-shadow:0 30px 100px rgba(0,0,0,.45);

      text-align:center;

      animation:appear .8s ease;

    }

    @keyframes appear{

      from{
        opacity:0;
        transform:translateY(20px)
        scale(.95);
      }

      to{
        opacity:1;
        transform:translateY(0)
        scale(1);
      }

    }

    .photo{

      width:170px;
      height:170px;

      aspect-ratio:1/1;

      border-radius:30px;

      object-fit:cover;

      border:2px solid rgba(0,255,255,.7);

      box-shadow:0 0 40px rgba(0,255,255,.25);

      margin-bottom:25px;

    }

    h1{

      font-family:"Playfair Display",serif;

      font-size:clamp(44px,10vw,65px);

      line-height:.9;

      margin-bottom:12px;

      background:linear-gradient(
      90deg,
      #fff,
      #00ffff);

      -webkit-background-clip:text;

      color:transparent;

    }

    .subtitle{

      color:#b7c1d6;

      font-size:15px;

      line-height:1.7;

      margin-bottom:30px;

    }

    .buttons{

      display:grid;

      gap:14px;

    }

    .btn{

      width:100%;

      padding:15px 18px;

      border-radius:999px;

      text-decoration:none;

      font-weight:800;

      font-size:15px;

      transition:.25s ease;

      border:1px solid rgba(255,255,255,.15);

      display:flex;

      align-items:center;

      justify-content:center;

    }

    .btn:hover{

      transform:translateY(-4px);

    }

    .website{

      background:#00ffff;

      color:#000;

      box-shadow:0 14px 40px rgba(0,255,255,.3);

    }

    .instagram{

      background:linear-gradient(
      135deg,
      #833ab4,
      #fd1d1d,
      #fcb045);

      color:white;

    }

    .coffee{

      background:#ffdd00;

      color:#111;

    }

    .voidbook{

      background:linear-gradient(
      135deg,
      #111,
      #3d3d3d);

      color:white;

    }

    .github{

      background:#171515;

      color:white;

    }

    .youtube{

      background:#ff0000;

      color:white;

    }

    .email{

      background:linear-gradient(
      135deg,
      #00c6ff,
      #0072ff);

      color:white;

    }

    .footer{

      margin-top:24px;

      color:#7f8aa3;

      font-size:12px;

    }

    @media(max-width:480px){

      .card{
        padding:30px 20px;
      }

      .photo{
        width:145px;
        height:145px;
      }

    }

  </style>
</head>

<body>

  <div id="loader">
  <div class="loader-ring"></div>
  <p>Loading Rezon’s links...</p>
</div>

<button class="theme-toggle" onclick="toggleTheme()">☀️</button>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <main class="card">

    <img
      class="photo"
      src="https://i.ibb.co/FkHtcJhM/1776077192856.jpg"
      alt="Rezon Haque">

    <h1>
      Rezon<br>Haque
    </h1>

    <p class="subtitle">
      Developer • Creator • Author • Digital Builder
    </p>

    <div class="buttons">

      <a
      class="btn website"
      href="https://rezonhaque.work.gd"
      target="_blank">

      Visit My Website

      </a>

      <a
      class="btn instagram"
      href="https://instagram.com/rezon5839"
      target="_blank">

      Instagram

      </a>

      <a
      class="btn coffee"
      href="https://www.buymeacoffee.com/rezonhaqueb"
      target="_blank">

      Buy Me a Coffee

      </a>

      <a
      class="btn voidbook"
      href="https://store.pothi.com/book/rezon-haque-void-0/"
      target="_blank">

      Buy My Book — THE VOID

      </a>

      <a
      class="btn github"
      href="https://rezon-dev.github.io/"
      target="_blank">

      GitHub

      </a>

      <a
      class="btn youtube"
      href="https://youtube.com/@rezumelodyofficial"
      target="_blank">

      YouTube

      </a>

      <a
      class="btn email"
      href="mailto:rezonhaque123@gmail.com">

      Email Me

      </a>

    </div>

    <p class="footer">
      © 2026 Rezon Haque
    </p>

  </main>

  <script>
  window.addEventListener("load", () => {
    setTimeout(() => {
      document.getElementById("loader").classList.add("hide");
    }, 900);
  });

  function toggleTheme(){
    document.body.classList.toggle("light");

    const btn = document.querySelector(".theme-toggle");

    if(document.body.classList.contains("light")){
      btn.textContent = "🌙";
      localStorage.setItem("theme","light");
    } else {
      btn.textContent = "☀️";
      localStorage.setItem("theme","dark");
    }
  }

  if(localStorage.getItem("theme") === "light"){
    document.body.classList.add("light");
    document.querySelector(".theme-toggle").textContent = "🌙";
  }
  </script>

</body>
</html>
